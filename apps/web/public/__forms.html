<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Virginia Dental Care forms</title>
  </head>
  <body>
    <form name="appointment-request" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="appointment-request" />
      <input name="bot-field" type="text" />
      <input name="serviceId" type="text" />
      <input name="firstName" type="text" />
      <input name="lastName" type="text" />
      <input name="phone" type="text" />
      <input name="email" type="email" />
      <input name="preferredDate" type="text" />
      <input name="preferredTime" type="text" />
      <input name="concern" type="text" />
      <input name="isNewPatient" type="text" />
    </form>
  </body>
</html>
